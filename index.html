<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta Tags -->
    <title>Mohamed Tayal | AI Engineer & Full Stack Developer</title>
    <meta name="title" content="Mohamed Tayal | AI Engineer & Full Stack Developer">
    <meta name="description" content="Portfolio of Mohamed Tayal, an AI Engineering student specializing in machine learning, deep learning, and full-stack web development.">
    <meta name="keywords" content="Mohamed Tayal, AI Engineer, Machine Learning, Full Stack Developer, React, Python, Deep Learning, Delta University">
    <meta name="author" content="Mohamed Tayal">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tayal.me/">
    <meta property="og:title" content="Mohamed Tayal | AI Engineer & Full Stack Developer">
    <meta property="og:description" content="Portfolio of Mohamed Tayal, an AI Engineering student specializing in machine learning, deep learning, and full-stack web development.">
    <meta property="og:image" content="https://tayal.me/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tayal.me/">
    <meta property="twitter:title" content="Mohamed Tayal | AI Engineer & Full Stack Developer">
    <meta property="twitter:description" content="Portfolio of Mohamed Tayal, an AI Engineering student specializing in machine learning, deep learning, and full-stack web development.">
    <meta property="twitter:image" content="https://tayal.me/og-image.jpg">

    <!-- Fontsource handles fonts locally -->

    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Structured Data / JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Mohamed Tayal",
      "jobTitle": "AI Engineer & Full Stack Developer",
      "url": "https://tayal.me",
      "sameAs": [
        "https://github.com/mohamedtayal",
        "https://www.linkedin.com/in/mohamedtayal"
      ],
      "alumniOf": {
        "@type": "CollegeOrUniversity",
        "name": "Delta University for Science and Technology"
      },
      "knowsAbout": ["Artificial Intelligence", "Machine Learning", "Deep Learning", "React.js", "Python", "Full Stack Development"]
    }
    </script>
  </head>
  <body class="bg-background text-foreground overflow-x-hidden selection:bg-primary/30 selection:text-primary-glow">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
